<svg width="220" height="90" viewBox="0 0 220 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow/ticket shape clip -->
    <clipPath id="badgeClip">
      <polygon points="0,0 195,0 220,40 195,80 0,80"/>
    </clipPath>
  </defs>

  <!-- Dark background with arrow shape -->
  <polygon points="0,0 195,0 220,40 195,80 0,80" fill="#1a1a1a" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Dashed border inside the shape -->
  <polygon points="5,5 192,5 215,40 192,75 5,75" fill="none" stroke="#f5c518" stroke-width="2" stroke-dasharray="6,4" style="fill:none;stroke:rgb(245, 197, 24);color:rgb(255, 255, 255);stroke-width:2px;stroke-dasharray:6px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- "BUY" text -->
  <text x="18" y="28" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#f5c518" letter-spacing="1" style="fill:rgb(245, 197, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Arial;font-size:13px;font-weight:900;text-anchor:start;dominant-baseline:auto">BUY</text>

  <!-- "GET" text -->
  <text x="18" y="48" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#f5c518" letter-spacing="1" style="fill:rgb(245, 197, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Arial;font-size:13px;font-weight:900;text-anchor:start;dominant-baseline:auto">GET</text>

  <!-- Big "1" -->
  <text x="68" y="58" font-family="Arial Black, Arial" font-weight="900" font-size="52" fill="white" dominant-baseline="auto" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Arial;font-size:52px;font-weight:900;text-anchor:start;dominant-baseline:auto">1</text>

  <!-- "FREE" text -->
  <text x="105" y="52" font-family="Arial Black, Arial" font-weight="900" font-size="24" fill="white" letter-spacing="1" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Arial;font-size:24px;font-weight:900;text-anchor:start;dominant-baseline:auto">FREE</text>
</svg>
<svg width="260" height="60" viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Rounded Rectangle -->
  <rect x="5" y="5" width="250" height="50" rx="6" ry="6" fill="url(#gradGreen)" />

  <!-- Text -->
  <text 
    x="50%" 
    y="50%" 
    dominant-baseline="middle" 
    text-anchor="middle"
    fill="#ffffff" 
    font-size="20" 
    font-weight="700"
    font-family="Arial, sans-serif">
    ONLY 5 AVAILABLES
  </text>

</svg>
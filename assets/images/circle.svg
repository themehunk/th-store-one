<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#ff0033"/>
    </radialGradient>
  </defs>

  <!-- Main Circle -->
  <circle cx="100" cy="100" r="60" fill="url(#grad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Text -->
  <text x="100" y="95" text-anchor="middle" fill="white" font-size="28" font-family="Arial" font-weight="bold" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:auto">50%</text>
  <text x="100" y="120" text-anchor="middle" fill="white" font-size="14" font-family="Arial" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">OFF</text>

  <!-- Small Tag Shape -->
  <rect x="40" y="120" width="30" height="30" rx="6" ry="6" fill="#ff0033" transform="rotate(-45 55 135)" style="fill:rgb(255, 0, 51);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>